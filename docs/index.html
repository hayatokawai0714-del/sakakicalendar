<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>出荷・予定管理</title>
    <link rel="manifest" href="./manifest.json?v=2026-05-30-2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="出荷予定" />
    <link rel="stylesheet" href="./style.css?v=2026-05-31-14" />
  </head>
  <body>
    <main class="container">
      <section class="card" aria-label="来週の出荷予定">
        <details id="nextWeekDetails" class="nextweek-details">
          <summary class="nextweek-summary">
            <span class="nextweek-title">来週の出荷予定</span>
            <span id="nextWeekRange" class="nextweek-range muted"></span>
            <span class="nextweek-chevron" aria-hidden="true"></span>
          </summary>
          <div id="nextWeekSummary" class="nextweek-card">
            <ul id="nextWeekList" class="nextweek-list"></ul>
          </div>
        </details>
      </section>

      <section class="card" aria-label="カレンダー">
        <div class="calendar-head"> 
          <button id="prevMonthBtn" class="btn secondary">前月</button>
          <h2 id="monthLabel"></h2>
          <button id="nextMonthBtn" class="btn secondary">翌月</button>
        </div>
        <div id="weekdayRow" class="weekday-row"></div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="card">
        <h2 id="selectedDateLabel">日付を選択してください</h2>
        <ul id="selectedDayList" class="list"></ul>
      </section>

      <section class="card">
        <h2>予定を追加 / 編集</h2>
        <form id="entryForm" class="form form--compact">
  <input type="hidden" id="entryId" />

  <div class="form-top-row">
    <label>
      種別
      <select id="entryType" required>
        <option value="shipment">出荷</option>
        <option value="event">予定</option>
        <option value="memo">メモ</option>
      </select>
    </label>

    <!-- Shipment only -->
    <label id="shipmentKindRow">
      出荷区分
      <select id="shipmentKind">
        <option value="spot">スポット</option>
        <option value="recurring">定期</option>
      </select>
    </label>

    <label id="spotDateRow">日付<input type="date" id="shipmentDate" /></label>

    <!-- Event only -->
    <label id="eventDateRow" class="hidden">日付<input type="date" id="eventDate" /></label>
    <label id="eventTimeRow" class="hidden">時刻<input type="time" id="eventTime" /></label>

    <!-- Memo only -->
    <label id="memoDateRow" class="hidden">日付<input type="date" id="memoDate" /></label>
    <label id="memoPriorityRow" class="hidden">
      優先度
      <select id="memoPriority">
        <option value="high">高</option>
        <option value="medium" selected>中</option>
        <option value="low">低</option>
      </select>
    </label>
  </div>

  <div id="shipmentFields" class="type-fields">
    <div id="recurringFields" class="subcard hidden">
      <div class="muted" style="margin: 0 0 8px;">定期出荷ルール</div>
      <input type="hidden" id="recurringId" />
      <label>
        繰り返し種類
        <select id="recurrenceType">
          <option value="weekly_1">毎週</option>
          <option value="weekly_2">隔週</option>
          <option value="monthlyByDate">毎月指定日</option>
        </select>
      </label>

      <div id="weekdayPicker" class="weekday-picker">
        <div class="muted" style="margin: 0 0 6px;">曜日（複数可）</div>
        <div class="weekday-buttons" id="weekdayButtons"></div>
      </div>

      <div id="monthDayPicker" class="hidden">
        <label>日付（カンマ区切り）<input type="text" id="monthDays" placeholder="例: 5,20,28" /></label>
      </div>

      <label>開始日<input type="date" id="startDate" /></label>
      <label>終了日（空欄可）<input type="date" id="endDate" /></label>
    </div>

    <div class="form-destination-row">
      <label>
        出荷先
        <select id="shipmentDestination"></select>
      </label>
    </div>

    <div class="form-spec-row">
      <label>
        規格
        <select id="shipmentStandard"></select>
      </label>
      <label>
        数量
        <input type="number" id="shipmentQuantity" min="0" step="0.01" inputmode="decimal" />
      </label>
      <label>
        単位
        <select id="shipmentUnit"></select>
      </label>
    </div>

    <div class="spec2-toggle">
      <button type="button" class="btn secondary small" id="addSpec2Btn">＋ 2つ目の規格を追加</button>
    </div>

    <div id="shipmentSpec2" class="subcard hidden">
      <div class="spec2-head">
        <div class="muted" style="margin: 0;">規格2（任意）</div>
        <button type="button" class="text-btn" id="removeSpec2Btn">削除</button>
      </div>
      <div class="form-spec-row">
        <label>
          規格2
          <select id="shipmentStandard2"></select>
        </label>
        <label>
          数量2
          <input type="number" id="shipmentQuantity2" min="0" step="0.01" inputmode="decimal" />
        </label>
        <label>
          単位2
          <select id="shipmentUnit2"></select>
        </label>
      </div>
    </div>

    <div class="form-memo-row">
      <label>メモ<textarea id="shipmentMemo" rows="2"></textarea></label>
    </div>
  </div>

  <div id="eventFields" class="type-fields hidden">
    <div class="form-destination-row">
      <label>予定名<input type="text" id="eventTitle" /></label>
    </div>
    <div class="form-memo-row">
      <label>メモ<textarea id="eventMemo" rows="2"></textarea></label>
    </div>
  </div>

  <div id="memoFields" class="type-fields hidden">
    <div class="form-memo-row">
      <label>メモ内容<textarea id="memoContent" rows="2"></textarea></label>
    </div>
  </div>

  <div class="actions">
    <button type="submit" class="btn">保存</button>
    <button type="button" id="cancelEditBtn" class="btn secondary">編集キャンセル</button>
  </div>
</form>
      </section>
      <section class="card admin-card" aria-label="管理メニュー">
        <div class="admin-bar admin-bar--bottom">
          <button type="button" class="admin-btn" data-panel="sync" id="adminSyncBtn">同期</button>
          <button type="button" class="admin-btn" data-panel="dest" id="adminDestBtn">出荷先＋</button>
          <button type="button" class="admin-btn" data-panel="units" id="adminUnitsBtn">規格＋</button>
        </div>
      </section>
      <!-- Panels (bottom-sheet style) -->
      <div class="sheet-backdrop hidden" data-sheet-backdrop="sync">
        <section class="sheet" role="dialog" aria-modal="true" aria-label="同期設定">
          <header class="sheet-header">
            <h3>同期</h3>
            <button type="button" class="icon-btn" data-sheet-close="sync" aria-label="閉じる">閉じる</button>
          </header>
          <div class="sheet-body">
            <p class="muted">未設定の場合はこの端末のlocalStorageに保存します。</p>
            <form id="syncForm" class="form compact">
              <label>API URL（GAS WebアプリURL）
                <input id="apiUrlInput" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
              </label>
              <label>更新者名（updatedBy）
                <input id="updatedByInput" type="text" placeholder="未設定" />
              </label>
              <div class="actions">
                <button type="submit" class="btn">保存</button>
                <button type="button" id="syncTestBtn" class="btn secondary">接続テスト</button>
              </div>
            </form>
            <div id="statusBar" class="status hidden" role="status" aria-live="polite"></div>
          </div>
        </section>
      </div>

      <div class="sheet-backdrop hidden" data-sheet-backdrop="dest">
        <section class="sheet" role="dialog" aria-modal="true" aria-label="出荷先マスタ">
          <header class="sheet-header">
            <h3>出荷先</h3>
            <button type="button" class="icon-btn" data-sheet-close="dest" aria-label="閉じる">閉じる</button>
          </header>
          <div class="sheet-body">
            <form id="destinationForm" class="form compact">
              <input type="hidden" id="destinationId" />
              <label>出荷先名<input id="destinationName" type="text" required /></label>
              <label>住所<input id="destinationAddress" type="text" /></label>
              <label>電話<input id="destinationPhone" type="text" /></label>
              <label>担当者<input id="destinationContact" type="text" /></label>
              <label>メール<input id="destinationEmail" type="email" /></label>
              <label>備考<textarea id="destinationNote" rows="2"></textarea></label>
              <label class="inline"><input id="destinationActive" type="checkbox" checked />有効</label>
              <div class="actions">
                <button type="submit" class="btn">保存</button>
                <button type="button" id="cancelDestinationEditBtn" class="btn secondary">編集キャンセル</button>
              </div>
            </form>
            <ul id="destinationList" class="list"></ul>
          </div>
        </section>
      </div>

      <div class="sheet-backdrop hidden" data-sheet-backdrop="units">
        <section class="sheet" role="dialog" aria-modal="true" aria-label="規格・単位設定">
          <header class="sheet-header">
            <h3>規格</h3>
            <button type="button" class="icon-btn" data-sheet-close="units" aria-label="閉じる">閉じる</button>
          </header>
          <div class="sheet-body">
            <div class="master-grid">
              <div>
                <h4>規格</h4>
                <form id="standardForm" class="inline-form">
                  <input id="standardInput" type="text" placeholder="規格名" />
                  <button class="btn" type="submit">追加</button>
                </form>
                <ul id="standardList" class="list"></ul>
              </div>
              <div>
                <h4>単位</h4>
                <form id="unitForm" class="inline-form">
                  <input id="unitInput" type="text" placeholder="単位名" />
                  <button class="btn" type="submit">追加</button>
                </form>
                <ul id="unitList" class="list"></ul>
              </div>
            </div>
          </div>
        </section>
      </div>
      <section class="debug-bar hidden" id="appDebugBar" aria-label="debug">
        <div class="debug-bar__row"><span id="appVersion"></span><span id="buildTime"></span></div>
        <div class="debug-bar__row muted" id="debugFlags"></div>
        <div class="debug-bar__err hidden" id="debugErrors"></div>
      </section>
    </main>

    <script src="./app.js?v=2026-05-31-14"></script>
  </body>
</html>
